# E2E CI — runs Playwright's 7 scenarios against wrangler dev.
# Scenarios 5 (chat) and 6 (display-case) are test.fixme'd until
# fixtures/llm/*.json is populated. See bakerysense-web/e2e/fixtures/llm/README.md.

name: E2E
on:
  pull_request:
    paths:
      - "bakerysense-web/**"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: bakerysense-web
    env:
      OPS_ROTATE_SECRET: test-ops-secret
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bakerysense-web/package-lock.json

      - name: Install JS deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright (5/6 auto-skip — no fixtures in CI)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: bakerysense-web/playwright-report/
          retention-days: 7
